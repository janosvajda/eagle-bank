services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eagle
      POSTGRES_PASSWORD: eagle
      POSTGRES_DB: eagle_bank
    ports:
      - "5432:5432"
    volumes:
      - eagle-bank-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eagle -d eagle_bank"]
      interval: 3s
      timeout: 3s
      retries: 20

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eagle
      POSTGRES_PASSWORD: eagle
      POSTGRES_DB: eagle_bank_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eagle -d eagle_bank_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  dynamodb-local:
    image: amazon/dynamodb-local:2.6.1
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    ports:
      - "8000:8000"

  localstack:
    image: localstack/localstack:4.4
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: eu-west-2
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q available"]
      interval: 3s
      timeout: 3s
      retries: 30

  migrate:
    build: .
    command: ["pnpm", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://eagle:eagle@postgres:5432/eagle_bank?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  dynamodb-init:
    image: amazon/aws-cli:2.27.22
    entrypoint: ["/bin/sh", "/init/init-dynamodb.sh"]
    environment: &aws-local
      AWS_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - ./docker:/init:ro
    depends_on:
      dynamodb-local:
        condition: service_started

  localstack-init:
    image: amazon/aws-cli:2.27.22
    entrypoint: ["/bin/sh", "/init/init-localstack.sh"]
    environment: *aws-local
    volumes:
      - ./docker:/init:ro
    depends_on:
      localstack:
        condition: service_healthy

  auth-service:
    build: .
    command: ["node", "dist/src/services/auth-server.js"]
    environment:
      NODE_ENV: preprod
      AUTH_SERVICE_PORT: 3001
      PORT: 3001
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://eagle:eagle@postgres:5432/eagle_bank?schema=public
      JWT_SECRET: local-user-jwt-secret-at-least-32-characters
      JWT_EXPIRES_IN: 1h
      AUTH_SESSION_TTL_SECONDS: 3600
      INTERNAL_SERVICE_JWT_SECRET: local-internal-jwt-secret-at-least-32-characters
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_AUTH_SESSIONS_TABLE: eagle-bank-auth-sessions
      <<: *aws-local
    depends_on:
      migrate:
        condition: service_completed_successfully
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  ledger-service:
    build: .
    command: ["node", "dist/src/services/ledger-server.js"]
    environment: &ledger-env
      NODE_ENV: preprod
      PORT: 3002
      LEDGER_SERVICE_PORT: 3002
      SERVICE_NAME: ledger-service
      DATABASE_URL: postgresql://eagle:eagle@postgres:5432/eagle_bank?schema=public
      JWT_SECRET: local-user-jwt-secret-at-least-32-characters
      INTERNAL_SERVICE_JWT_SECRET: local-internal-jwt-secret-at-least-32-characters
      AWS_REGION: eu-west-2
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3002/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      NODE_ENV: preprod
      PORT: 3000
      SERVICE_NAME: api
      DATABASE_URL: postgresql://eagle:eagle@postgres:5432/eagle_bank?schema=public
      JWT_SECRET: local-user-jwt-secret-at-least-32-characters
      JWT_EXPIRES_IN: 1h
      INTERNAL_SERVICE_JWT_SECRET: local-internal-jwt-secret-at-least-32-characters
      AUTH_SERVICE_BASE_URL: http://auth-service:3001
      LEDGER_SERVICE_BASE_URL: http://ledger-service:3002
      AWS_REGION: eu-west-2
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  ledger-event-publisher:
    build: .
    command: ["node", "dist/src/services/ledger-event-publisher.js"]
    environment:
      <<: [*ledger-env, *aws-local]
      SQS_ENDPOINT: http://localstack:4566
      SQS_LEDGER_EVENTS_QUEUE_URL: http://localstack:4566/000000000000/eagle-bank-ledger-events
      LEDGER_EVENT_PUBLISHER_POLL_INTERVAL_MS: 1000
      LEDGER_EVENT_PUBLISHER_BATCH_SIZE: 10
      LEDGER_EVENT_PUBLISHER_MAX_ATTEMPTS: 5
      LEDGER_EVENT_PUBLISHER_BACKOFF_BASE_MS: 1000
      LEDGER_EVENT_PUBLISHER_BACKOFF_MAX_MS: 60000
      LEDGER_EVENT_PUBLISHER_PROCESSING_LEASE_MS: 30000
    depends_on:
      migrate:
        condition: service_completed_successfully
      localstack-init:
        condition: service_completed_successfully

  ledger-worker:
    build: .
    command: ["node", "dist/src/services/ledger-worker.js"]
    environment:
      <<: [*ledger-env, *aws-local]
      LEDGER_ASYNC_COMMANDS_ENABLED: "false"
      SQS_ENDPOINT: http://localstack:4566
    depends_on:
      localstack-init:
        condition: service_completed_successfully

volumes:
  eagle-bank-data:
